# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whereabouts
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: whereabouts-chart
      version: 0.9.3
      sourceRef:
        kind: HelmRepository
        name: whereabouts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values: {}
