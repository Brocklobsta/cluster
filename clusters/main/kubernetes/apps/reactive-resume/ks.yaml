apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: reactive-resume
  namespace: flux-system
spec:
  dependsOn:
    - name: cloudnative-pg
    - name: volsync
  interval: 10m
  path: clusters/main/kubernetes/apps/reactive-resume/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
