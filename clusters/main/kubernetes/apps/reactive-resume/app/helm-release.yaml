apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reactive-resume
  namespace: reactive-resume
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.14.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    timeout: 30m
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  valuesFrom:
    - kind: Secret
      name: reactive-resume-values
      valuesKey: values.yaml
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: postgresql.cnpg.io
              version: v1
              kind: Cluster
              name: reactive-resume-app-template-cnpg-main
            patch: |-
              - op: add
                path: /spec/affinity
                value:
                  enablePodAntiAffinity: true
                  podAntiAffinityType: required
                  topologyKey: kubernetes.io/hostname
              - op: replace
                path: /spec/enableSuperuserAccess
                value: false
          - target:
              group: volsync.backube
              version: v1alpha1
              kind: ReplicationDestination
            patch: |-
              - op: add
                path: /spec/restic/moverSecurityContext/runAsNonRoot
                value: true
              - op: add
                path: /spec/restic/moverSecurityContext/seccompProfile
                value:
                  type: RuntimeDefault
          - target:
              group: volsync.backube
              version: v1alpha1
              kind: ReplicationSource
            patch: |-
              - op: add
                path: /spec/restic/moverSecurityContext/runAsNonRoot
                value: true
              - op: add
                path: /spec/restic/moverSecurityContext/seccompProfile
                value:
                  type: RuntimeDefault
  values:
    global:
      stopAll: false
    TZ: America/Los_Angeles
    image:
      repository: ghcr.io/amruthpillai/reactive-resume
      tag: v5.2.3@sha256:bfacee69faad04a8b785854d02cb078fb223824e8b07a07ff21fa39ebfa9fe8c
      pullPolicy: IfNotPresent
    smtpProxyImage:
      repository: docker.io/alpine/socat
      tag: 1.8.0.3@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
      pullPolicy: IfNotPresent
    securityContext:
      container:
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        privileged: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
      pod:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 2Gi
    credentials:
      b2:
        accessKey: ${S3_KEY_ID}
        bucket: ${S3_BUCKET}
        encrKey: ${S3_PASSWORD}
        secretKey: ${S3_SECRET_KEY}
        type: s3
        url: ${S3_ENDPOINT}
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                APP_URL: https://rr.${DOMAIN_0}
                AUTH_SECRET: '{{ .Values.authSecret }}'
                DATABASE_URL: '{{ .Values.cnpg.main.creds.std }}'
                ENCRYPTION_SECRET: '{{ .Values.encryptionSecret }}'
                FLAG_ALLOW_UNSAFE_AI_BASE_URL: "false"
                FLAG_ALLOW_UNSAFE_OAUTH_REDIRECT_URI: "false"
                FLAG_DISABLE_API_RATE_LIMIT: "false"
                FLAG_DISABLE_EMAIL_AUTH: "false"
                FLAG_DISABLE_IMAGE_PROCESSING: "false"
                FLAG_DISABLE_SIGNUPS: "false"
                FLAG_SHOW_SPONSORS: "false"
                LOCAL_STORAGE_PATH: /app/data
                PORT: "3000"
                REDIS_URL: 'redis://:{{ .Values.redis.password }}@reactive-resume-redis:6379/0'
                SMTP_FROM: "Reactive Resume <${PROTONMAIL_EMAIL}>"
                NODE_EXTRA_CA_CERTS: /etc/ssl/certs/protonmail-bridge.pem
                SMTP_HOST: 127.0.0.1
                SMTP_PASS: "${PROTONMAIL_PASSWORD}"
                SMTP_PORT: "2525"
                SMTP_SECURE: "false"
                SMTP_USER: "${PROTONMAIL_EMAIL}"
              probes:
                liveness:
                  enabled: true
                  type: http
                  port: 3000
                  path: /api/health
                readiness:
                  enabled: true
                  type: http
                  port: 3000
                  path: /api/health
                startup:
                  enabled: true
                  type: http
                  port: 3000
                  path: /api/health
            smtp-proxy:
              enabled: true
              imageSelector: smtpProxyImage
              args:
                - TCP-LISTEN:2525,bind=127.0.0.1,reuseaddr,fork
                - TCP:protonmail-bridge.protonmail-bridge.svc.cluster.local:25
              probes:
                liveness:
                  enabled: true
                  type: tcp
                  port: 2525
                readiness:
                  enabled: true
                  type: tcp
                  port: 2525
                startup:
                  enabled: true
                  type: tcp
                  port: 2525
    service:
      main:
        ports:
          main:
            port: 3000
            targetPort: 3000
            protocol: http
    ingress:
      main:
        enabled: true
        required: true
        ingressClassName: external
        hosts:
          - host: rr.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          nginx:
            enabled: true
            auth:
              type: authentik
              internalHost: authentik-http.authentik.svc.cluster.local:10230
              externalHost: auth.${DOMAIN_0}
              responseHeaders: []
    configmap:
      smtp-ca:
        enabled: true
        data:
          protonmail-bridge.pem: "-----BEGIN CERTIFICATE-----\nMIIDkzCCAnugAwIBAgIRALJbRosNcRUwIVzdFkr5ulswDQYJKoZIhvcNAQELBQAw\nSzELMAkGA1UEBhMCQ0gxEjAQBgNVBAoTCVByb3RvbiBBRzEUMBIGA1UECxMLUHJv\ndG9uIE1haWwxEjAQBgNVBAMTCTEyNy4wLjAuMTAeFw0yNDA1MDkyMzUxMTlaFw00\nNDA1MDQyMzUxMTlaMEsxCzAJBgNVBAYTAkNIMRIwEAYDVQQKEwlQcm90b24gQUcx\nFDASBgNVBAsTC1Byb3RvbiBNYWlsMRIwEAYDVQQDEwkxMjcuMC4wLjEwggEiMA0G\nCSqGSIb3DQEBAQUAA4IBDwAwggEKAoIBAQDRMxtqLDXAb8pbwLfMQWXxBYfQk8Uu\nHwm7uTgkCT89N8Z0vd9PiBQEBRI4BIHlQEIQB+7QY+owdf5k95F2jwm6wulDku0l\ng1ueXEJIyWoYFTm60MCVwsiCL3C66hwwFCkdiCyp2yJSYgC+p10aG1GMHiKqbMXX\nHRXqrPqDTpS1mGFu+NXUQutNtWhij5CheUEM0nVbeHU95oCD3hC/ZyVPDr1ATU0j\nmuRwW5Fz/wN/rFWVO8yMpxqrRCMi6c5M3h7ki0+WWJsMbGtPtnbDK5ZXTL3bX/v1\ndFlRFljxiaMcT0PTK7sQGbmj08MiXNQsUhFgzpPk3nVnatl+ZEkLHUClAgMBAAGj\ncjBwMA4GA1UdDwEB/wQEAwICpDAdBgNVHSUEFjAUBggrBgEFBQcDAQYIKwYBBQUH\nAwIwDwYDVR0TAQH/BAUwAwEB/zAdBgNVHQ4EFgQUK5844nKvMxtLcXeEptWDs1f6\nYWowDwYDVR0RBAgwBocEfwAAATANBgkqhkiG9w0BAQsFAAOCAQEARUYbTFE7Zz6D\n7yAT3UqepXkjBuR1Qq6HFTjv13AhuC75I/fbpjS35et+GJK42BVgwkwcXPtYzlMe\n/UTx6abzViziAipbt4bQgPbEZGpNkDVwO4q3Nnc1QvF6enzCsOHoS1/rUyMXkL4m\nmVe84nBJO4dSGvTvk/bPME7nzYowZ2D1HaCWLj7wMtwiZLUGCCX7YSh/PnO3qTNO\nITv+wAL/uy7raHRNzrblsbkkqefdK0Q4aeRrmJWQWF2jicsepydBO2u2kyU7D1KR\nyeO/1wmvfd/dliZroAsDGQ6bmWaGyuZaBJ2LSe3kkdsDq5kznleYQpTg33RlZYIk\nqIAy9t4Fog==\n-----END CERTIFICATE-----\n"
    persistence:
      smtp-ca:
        enabled: true
        type: configmap
        objectName: smtp-ca
        mountPath: /etc/ssl/certs/protonmail-bridge.pem
        subPath: protonmail-bridge.pem
        readOnly: true
        targetSelectAll: true
      data:
        enabled: true
        type: pvc
        size: 5Gi
        mountPath: /app/data
        targetSelectAll: true
        volsync:
          - name: data
            type: restic
            credentials: b2
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: 30 2 * * *
    cnpg:
      main:
        enabled: true
        mode: standalone
        database: reactive_resume
        user: reactive_resume
        password: ${CNPG_PASSWORD}
        pgVersion: 16
        cluster:
          instances: 2
          storage:
            size: 10Gi
          walStorage:
            size: 5Gi
        monitoring:
          enablePodMonitor: true
        backups:
          enabled: true
          credentials: b2
          target: prefer-standby
          scheduledBackups:
            - name: daily-backup
              schedule: "0 5 0 * * *"
              backupOwnerReference: self
              immediate: true
              suspend: false
          retentionPolicy: 30d
    redis:
      enabled: true
      credentials:
        b2:
          type: s3
          url: "${S3_ENDPOINT}"
          bucket: "${S3_BUCKET}"
          accessKey: "${S3_KEY_ID}"
          secretKey: "${S3_SECRET_KEY}"
          encrKey: "${S3_PASSWORD}"
      persistence:
        data:
          enabled: true
          type: pvc
          storageClass: longhorn
          accessModes:
            - ReadWriteOnce
          size: 2Gi
          mountPath: /bitnami/valkey
          targetSelectAll: true
          volsync:
            - name: valkey
              type: restic
              credentials: b2
              dest:
                enabled: true
              src:
                enabled: true
                trigger:
                  schedule: "45 2 * * *"
      securityContext:
        container:
          runAsNonRoot: true
          runAsUser: 568
          runAsGroup: 568
