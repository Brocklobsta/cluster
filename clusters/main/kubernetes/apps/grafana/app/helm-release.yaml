apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 15m
  chart:
    spec:
      chart: grafana
      version: 23.8.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    timeout: 30m
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: postgresql.cnpg.io
              version: v1
              kind: Cluster
            patch: |-
              - op: add
                path: /spec/affinity
                value:
                  enablePodAntiAffinity: true
                  topologyKey: kubernetes.io/hostname
                  podAntiAffinityType: required
  values:
    global:
      stopAll: false
    TZ: America/Los_Angeles
    cnpg:
      main:
        monitoring:
          enablePodMonitor: true
        backups:
          credentials: b2
          enabled: true
        database: grafana
        enabled: true
        mode: recovery
        password: ${CNPG_PASSWORD}
        pgVersion: 16
        recovery:
          credentials: b2
          enabled: true
        user: grafana
    credentials:
      b2:
        accessKey: ${S3_KEY_ID}
        bucket: ${S3_BUCKET}
        encrKey: ${S3_PASSWORD}
        name: b2
        path: ""
        secretKey: ${S3_SECRET_KEY}
        type: s3
        url: ${S3_ENDPOINT}
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: graph.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          certManager:
            certificateIssuer: domain-0-le-prod
            enabled: true
          nginx:
            enabled: true
    persistence:
      data:
        volsync:
          - credentials: b2
            dest:
              enabled: true
            name: data
            src:
              enabled: true
              trigger:
                schedule: 30 8 * * *
            type: restic
    configmap:
      datasource-loki:
        enabled: true
        labels:
          grafana_datasource: "1"
        data:
          datasource-loki.yaml: |-
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                uid: loki
                url: http://loki-headless.loki.svc.cluster.local:3100
                access: proxy
                isDefault: false
                jsonData:
                  maxLines: 250 
    workload:
      main:
        podSpec:
          containers:
            dashboards:
              resources:
                limits:
                  cpu: 1000m
            main:
              env:
                GF_AUTH_GENERIC_OAUTH_API_URL: https://auth.${DOMAIN_0}/application/o/userinfo/
                GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://auth.${DOMAIN_0}/application/o/authorize/
                GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
                GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
                GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
                GF_AUTH_GENERIC_OAUTH_NAME: authentik
                GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
                GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
                GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://auth.${DOMAIN_0}/application/o/token/
                GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP: "true"
                GF_AUTH_OAUTH_AUTO_LOGIN: "true"
                GF_AUTH_SIGNOUT_REDIRECT_URL: https://auth.${DOMAIN_0}/application/o/grafana/end-session/
                GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
                GF_SECURITY_ADMIN_USER: admin
                GF_SERVER_ROOT_URL: https://graph.${DOMAIN_0}
                GF_SMTP_ENABLED: "true"
                GF_SMTP_HOST: protonmail-bridge.protonmail-bridge.svc.cluster.local:25
                GF_SMTP_USER: ${PROTONMAIL_EMAIL}
                GF_SMTP_PASSWORD: ${PROTONMAIL_PASSWORD}
                GF_SMTP_FROM_ADDRESS: ${ADMIN_EMAIL}
                GF_SMTP_FROM_NAME: "Grafana Notifications"
                GF_SMTP_SKIP_VERIFY: "true"
                GF_PANELS_DISABLE_SANITIZE_HTML: "true"
    dashboards:
      grafana:
        cert-manager:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          marketplace:
            # renovate: depName="Cert-manager-Kubernetes"
            id: 20842
            revision: 3
        cnpg:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          marketplace:
            # renovate: depName="CloudNativePG"
            id: 20417
            revision: 4
        flux-cluster:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/refs/heads/main/monitoring/configs/dashboards/cluster.json
        flux-control-plane:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/refs/heads/main/monitoring/configs/dashboards/control-plane.json
        node-feature-discovery:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          url: https://github.com/kubernetes-sigs/node-feature-discovery/raw/refs/tags/v0.18.3/examples/grafana-dash
        metallb:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          marketplace:
            # renovate: depName="Metallb"
            id: 20162
            revision: 6
        nginx:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          url: https://github.com/kubernetes/ingress-nginx/raw/refs/tags/ingress-nginx-3.15.2/deploy/grafana/dashboards/nginx.json
        blocky:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          url: https://raw.githubusercontent.com/0xERR0R/blocky/refs/heads/main/docs/blocky-grafana.json
        logs-container:
          enabled: true
          datasource:
            - name: "$${DS_LOKI}"
              value: loki
          marketplace:
            # renovate: depName="Container Log Dashboard"
            id: 16966
            revision: 1
        arrs:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          url: https://raw.githubusercontent.com/onedr0p/exportarr/refs/heads/master/examples/grafana/dashboard2.json
        cilium:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          marketplace:
            # renovate: depName="Cilium"
            id: 21431
            revision: 6
        longhorn:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          marketplace:
            # renovate: depName="Longhorn"
            id: 23521
            revision: 2
        k8s:
          enabled: true
          datasource:
            - name: "$${DS__VICTORIAMETRICS-PROD-ALL}"
              value: Prometheus
          marketplace:
            # renovate: depName="k8s"
            id: 15661
            revision: 2
        node:
          enabled: true
          datasource:
            - name: "$${DS_PROMETHEUS}"
              value: Prometheus
          marketplace:
            # renovate: depName="Node Exporter Full"
            id: 1860
            revision: 45
